[project]
name = "prodeo-stt-fasterwhisper"
version = "0.1.0"
description = "Mjölnir speech-to-text engine backed by faster-whisper (CPU-capable)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = ["prodeo-mjolnir", "faster-whisper>=1.0"]

[project.entry-points."prodeo.plugins"]
faster-whisper = "prodeo_stt_fasterwhisper:manifest"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prodeo_stt_fasterwhisper"]

[tool.uv.sources]
prodeo-mjolnir = { workspace = true }
