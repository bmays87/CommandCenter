[project]
name = "prodeo-adapter-aider"
version = "0.1.0"
description = "Prodeo Command Center adapter for Aider (observe + historical via chat history files)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = ["prodeo"]

[project.entry-points."prodeo.plugins"]
aider = "prodeo_adapter_aider:manifest"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prodeo_adapter_aider"]

[tool.uv.sources]
prodeo = { workspace = true }
