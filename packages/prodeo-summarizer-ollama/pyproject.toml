[project]
name = "prodeo-summarizer-ollama"
version = "0.1.0"
description = "Prodeo Command Center summarizer plugin backed by a local Ollama model"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = ["prodeo", "httpx>=0.27"]

[project.entry-points."prodeo.plugins"]
ollama = "prodeo_summarizer_ollama:manifest"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prodeo_summarizer_ollama"]

[tool.uv.sources]
prodeo = { workspace = true }
