[project]
name = "prodeo-mjolnir"
version = "0.1.0"
description = "Mjölnir - the Prodeo Command Center voice client (wake word, STT, intents, TTS)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = [
    "prodeo",
    "httpx>=0.27",
    "websockets>=12",
    "python-ulid>=2.6",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "structlog>=24.1",
]

[project.optional-dependencies]
# Real microphone/speaker I/O (PortAudio). Tests and headless use inject
# their own AudioSource/AudioSink instead.
audio = ["sounddevice>=0.4.6"]

[project.scripts]
prodeo-mjolnir = "prodeo_mjolnir.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prodeo_mjolnir"]

[tool.uv.sources]
prodeo = { workspace = true }
